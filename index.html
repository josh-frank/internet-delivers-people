<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Television Delivers People</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #00F;
      font-family: "Comic Sans MS", "Comic Sans", cursive;
      overflow: hidden;
    }

    main {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    #scroll-container {
      position: absolute;
      left: 0;
      right: 0;
      top: 100vh;
      /* starts below the viewport */
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    section {
      width: 100%;
      max-width: 640px;
      padding: 0 3rem;
      /* each section is sized to the viewport so one card fills the screen */
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    
    section p {
      font-size: clamp(2.5rem, 7vw, 4rem);
      font-weight: bold;
      line-height: 1.1;
      color: #FF0;
      text-shadow: 0.2rem 0.2rem 0 rgba(0, 0, 0, 1);
      /* honor the \n line-breaks in the text */
      white-space: pre-line;
    }
  </style>
  <script>
    const paragraphs = [
      "The Internet\nDelivers\nPeople",
      "Josh Frank\n2026",
      "The Product of the Internet, Commercial Internet, is the Audience.",
      "The Internet delivers people to an advertiser.",
      "There is no such thing as mass media in the United States anymore except for The Internet.",
      "Mass media means that a medium can deliver masses of people.",
      "The Internet delivers 6.5 billion people a minute.",
      "On the Internet the viewer pays for the privilege of having himself sold.",
      "It is the consumer who is consumed.",
      "You are the product of The Internet.",
      "You are delivered to the advertiser who is the customer.",
      "He consumes you.",
      "The viewer is not responsible for content.",
      "You are the end product.",
      "You are the end product delivered en masse to the advertiser.",
      "You are the product of The Internet.",
      "Everything on The Internet is educational in the sense that it teaches something.",
      "What The Internet teaches through commercialism is materialistic consumption.",
      "The NEW MEDIA STATE is predicated on media control.",
      "Media asserts an influence over an entire cultural spectrum, without effort or qualification.",
      "We are persuaded daily by a corporate oligarchy.",
      "Corporate control advocates materialistic propaganda.",
      "Tech establishments are committed to economic survival: ……",
      "Propaganda for Profit.",
      "The Internet is the prime instrument for the management of consumer demands.",
      "Commercial Internet defines the world in specific terms.",
      "Commercial Internet defines the world so as not to threaten the status quo.",
      "The Internet defines the world so as not to threaten you.",
      "Soft propaganda is considered entertainment.",
      "POPULAR ENTERTAINMENT IS BASICALLY PROPAGANDA FOR THE STATUS QUO.",
      "Control over The Internet is an exercise in controlling society.",
      "Seventy-five percent of news is received by you from The Internet.",
      "What goes on over the news is what you know.",
      "It is the basis by which you make judgements, by which you think.",
      "You are the controlled product of news websites.",
      "Online content dominates the exposure of ideas and information.",
      "There is inherent conflict between:",
      "COMMERCE,",
      "INFORMATION,",
      "ENTERTAINMENT.",
      "There is a mass media compulsion to reinforce the status quo. To reinforce the distribution of power.",
      "The NEW MEDIA STATE is dependent on The Internet for its existence.",
      "The NEW MEDIA STATE is dependent on propaganda for its existence.",
      "Corporations that own ISPs control them.",
      "CORPORATIONS ARE NOT RESPONSIBLE.",
      "CORPORATIONS ARE NOT RESPONSIBLE TO GOVERNMENT.",
      "CORPORATIONS ARE NOT RESPONSIBLE TO THEIR EMPLOYEES.",
      "CORPORATIONS ARE NOT RESPONSIBLE TO THEIR SHAREHOLDERS.",
      "Shareholders do not organize and enforce their will. Shareholders buy stock in companies and don't even know what the companies do.",
      "Corporations mitigate information.",
      "Every dollar spent by the tech industry in physical equipment needed to send a message to you is matched by forty dollars spent by you to receive it.",
      "You pay the money to allow someone else to make the choice.",
      "You are consumed.",
      "You are the product of The Internet.",
      "The Internet delivers people.",
      "\"THE INTERNET\nDELIVERS\nPEOPLE\"",
      "Josh Frank",
      "COPYRIGHT 2026",
    ];

    // Pixels per second the text scrolls upward.
    // The original runs ~7 min for ~58 paragraphs, so roughly 7–8 s per card.
    // At 100vh ≈ 800 px that means ~100 px/s.
    const PX_PER_SEC = 100;

    document.addEventListener("DOMContentLoaded", () => {
      const container = document.getElementById("scroll-container");

      // Build all sections up front
      paragraphs.forEach((text) => {
        const sec = document.createElement("section");
        const p = document.createElement("p");
        p.textContent = text;
        sec.appendChild(p);
        container.appendChild(sec);
      });

      let startTime = null;
      // Total distance to travel: all sections (each 100vh) + one extra vh to
      // fully clear the last card off the top of the screen.
      const totalSections = paragraphs.length;
      // We measure in pixels at runtime so the animation stays accurate even
      // if the user resizes.
      let totalPx = 0;
      let currentY = 0;
      let running = true;

      function computeTotalPx() {
        totalPx = container.scrollHeight + window.innerHeight;
      }

      function step(ts) {
        if (!running) return;
        if (!startTime) {
          startTime = ts;
          computeTotalPx();
        }

        const elapsed = (ts - startTime) / 1000; // seconds
        currentY = elapsed * PX_PER_SEC;

        // Transform: move the container upward from its initial top:100vh position
        container.style.transform = `translateY(-${currentY}px)`;

        if (currentY < totalPx) {
          requestAnimationFrame(step);
        }
      }

      requestAnimationFrame(step);
    });
  </script>
</head>

<body>
  <main>
    <!-- Music credit: free-stock-music.com -->
    <audio id="muzak" src="muzak.wav" loop autoplay></audio>
    <div id="scroll-container"></div>
  </main>
</body>

</html>
